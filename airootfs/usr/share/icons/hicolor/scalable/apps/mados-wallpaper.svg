<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4C566A"/>
      <stop offset="50%" style="stop-color:#81A1C1"/>
      <stop offset="100%" style="stop-color:#88C0D0"/>
    </linearGradient>
    <linearGradient id="mountain1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5E81AC"/>
      <stop offset="100%" style="stop-color:#4C566A"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81A1C1"/>
      <stop offset="100%" style="stop-color:#5E81AC"/>
    </linearGradient>
  </defs>
  
  <!-- Frame/Monitor -->
  <rect x="2" y="4" width="60" height="44" rx="4" fill="#2E3440" stroke="#4C566A" stroke-width="2"/>
  
  <!-- Screen background -->
  <rect x="6" y="8" width="52" height="36" rx="2" fill="url(#sky)"/>
  
  <!-- Mountains back layer -->
  <polygon points="6,44 20,24 34,44" fill="url(#mountain1)"/>
  <polygon points="24,44 42,20 60,44" fill="url(#mountain1)"/>
  
  <!-- Mountains front layer -->
  <polygon points="6,44 14,30 22,44" fill="url(#mountain2)"/>
  <polygon points="18,44 32,26 46,44" fill="url(#mountain2)"/>
  <polygon points="38,44 50,28 60,44" fill="url(#mountain2)"/>
  
  <!-- Sun/Moon -->
  <circle cx="44" cy="16" r="6" fill="#EBCB8B" opacity="0.9"/>
  
  <!-- Stars -->
  <circle cx="12" cy="14" r="1" fill="#D8DEE9" opacity="0.8"/>
  <circle cx="20" cy="12" r="1.2" fill="#D8DEE9" opacity="0.7"/>
  <circle cx="28" cy="16" r="0.8" fill="#D8DEE9" opacity="0.9"/>
  
  <!-- Monitor stand -->
  <rect x="24" y="48" width="16" height="4" rx="1" fill="#4C566A"/>
  <rect x="18" y="52" width="28" height="4" rx="1" fill="#3B4252"/>
  
  <!-- Frame inner shadow -->
  <rect x="6" y="8" width="52" height="36" rx="2" fill="none" stroke="#2E3440" stroke-width="1" opacity="0.3"/>
</svg>
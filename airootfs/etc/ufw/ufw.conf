# /etc/ufw/ufw.conf
# UFW main configuration

# Set to yes to start on boot
ENABLED=yes

# Set default input policy to DROP, REJECT or ACCEPT
DEFAULT_INPUT_POLICY="DROP"

# Set default output policy to ACCEPT, REJECT or DROP
DEFAULT_OUTPUT_POLICY="ACCEPT"

# Set default forward policy to DROP, REJECT or ACCEPT
DEFAULT_FORWARD_POLICY="DROP"

# Set default application policy to ACCEPT, DROP or REJECT
DEFAULT_APPLICATION_POLICY="SKIP"

# By default, ufw only touches IPv4
IPV6=yes

# Extra connection tracking modules to load
IPT_MODULES="nf_conntrack_ftp nf_nat_ftp nf_conntrack_netbios_ns"
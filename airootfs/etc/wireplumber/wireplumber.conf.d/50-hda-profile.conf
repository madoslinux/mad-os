# Auto-select best profile for all ALSA cards
# This fixes the "Dummy Output" issue where WirePlumber doesn't pick a profile
monitor.alsa.rules = [
  {
    matches = [
      {
        "device.name" = "~alsa_card.*"
      }
    ]
    actions = {
      update-props = {
        "device.profile-priority" = 1
        "device.profile" = "output:analog-stereo+input:analog-stereo"
      }
    }
  }
]
# madOS Scheduler Tuning
# Optimized for desktop responsiveness with EEVDF scheduler

# EEVDF Tuning - Reduces latency for interactive tasks
kernel.sched_latency_ns = 18000000
kernel.sched_min_granularity_ns = 3000000
kernel.sched_wakeup_granularity_ns = 3000000
kernel.sched_tunable_scaling = 0
kernel.sched_min_granularity_runtime = 2000000
kernel.sched_migration_cost_ns = 500000

# CPU Scheduler Behavior
# Favor interactive tasks
kernel.sched_child_runs_first = 0
kernel.sched_wake_to_idle = 0

# I/O Scheduler tuning for desktop
# Use MQ-DEADLINE for NVMe, BFQ for rotational
dev.dm-default-io-latency-action = 1
dev.dm-default-io-_latency-threshold = 1000

# Virtual Memory tuning for responsiveness
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5
vm.swappiness = 5
vm.page-cluster = 3
vm.zone_reclaim_mode = 0

# Network for low latency
net.core.netdev_budget = 300
net.core.netdev_budget_usecs = 3000
net.core.traffic_class_budget = 200

# Timer slack for better power savings without hurting interactivity
kernel.timer_migration = 1

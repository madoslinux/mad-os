# /etc/usbguard/usbguard-daemon.conf
# USBGuard - USB device authorization

# Allow implicit policy (log but don't block) for now
# This can be changed to block after user configures allowed devices
ImplicitPolicyTarget=allow
PresentPolicyTarget=allow
AbsentPolicyTarget=allow

# IPC settings - allow users in wheel group to manage
IPCAllowedGroups=wheel
IPCAccessControl=relaxed

# Audit
AuditBackend=FileAudit
AuditFilePath=/var/log/usbguard/usbguard-audit.log

# Rules file location
RulesFile=/etc/usbguard/rules.conf

# Notification script (notify user when USB connected)
DevicePolicyChangedNotification=/etc/usbguard/usbguard-notify.py
DevicePresenceChangedNotification=/etc/usbguard/usbguard-notify.py
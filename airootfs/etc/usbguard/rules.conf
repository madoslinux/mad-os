# /etc/usbguard/rules.conf
# USBGuard rules - allow basic HID devices, block everything else
# Generated for madOS

# Allow keyboards and mice (HID devices)
allow with-interface equals { 03:01:01, 03:01:02 }

# Allow USB storage (after user confirmation in first run)
# Comment this out if you want to manually approve each storage device
allow with-interface equals { 08:06:50 }

# Block everything else by default
block
[colors]
bg = #BF2E3440
fg = #ECEFF4
frost1 = #88C0D0
frost2 = #81A1C1
frost3 = #5E81AC
green = #00FF9F
cyan = #00D4FF
mint = #00FFAA
purple = #C77DFF
amber = #FFAA00
lime = #39FF14
red = #FF3366
warn = #D08770
crit = #BF616A

[bar/top]
width = 100%
height = 24
radius = 0
fixed-center = true

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 0
border-size = 0
padding-left = 2
padding-right = 2
module-margin-left = 2
module-margin-right = 2

font-0 = "Michroma:size=8;2"
font-1 = "Hack Nerd Font:size=8;2"
font-2 = "Hack Nerd Font:size=8;2"
font-3 = "Noto Color Emoji:size=8;2"
font-4 = "Symbols Nerd Font:size=8;2"

modules-left = i3ws
modules-center = date
modules-right = tray network cpu memory volume backlight battery help power

tray-position = right
tray-padding = 6
tray-maxsize = 16

wm-restack = i3
enable-ipc = true

[module/i3ws]
type = custom/script
exec = ~/.config/polybar/scripts/workspaces.sh
interval = 1

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M
label = %date%  %time%
label-foreground = ${colors.red}

[module/cpu]
type = internal/cpu
interval = 3
label = CPU %percentage%%
label-foreground = ${colors.green}
click-left = foot -e btop

[module/memory]
type = internal/memory
interval = 5
label = RAM %percentage_used%%
label-foreground = ${colors.cyan}
click-left = foot -e btop

[module/network]
type = internal/network
interface-type = wireless
interval = 3
format-connected = NET %essid%
format-connected-foreground = ${colors.mint}
format-disconnected = NET Disconnected
format-disconnected-foreground = ${colors.frost3}
click-left = foot -e nmtui

[module/volume]
type = custom/script
exec = ~/.config/polybar/scripts/volume.sh
interval = 2
label-foreground = ${colors.purple}
click-left = mados-equalizer
click-right = pavucontrol
click-middle = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
scroll-up = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ -l 1.0
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
label = BRI %percentage%%
label-foreground = ${colors.amber}
scroll-up = brightnessctl set +5%
scroll-down = brightnessctl set 5%-

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
poll-interval = 10
label-charging = BAT %percentage%%
label-discharging = BAT %percentage%%
label-full = BAT 100%
label-charging-foreground = ${colors.lime}
label-discharging-foreground = ${colors.lime}
label-full-foreground = ${colors.lime}

format-low = BAT %percentage%%
format-low-foreground = ${colors.warn}

[module/help]
type = custom/text
content = ?
content-foreground = ${colors.frost2}
click-left = /usr/local/bin/mados-help

[module/power]
type = custom/text
content = ⏻
content-foreground = ${colors.crit}
click-left = /usr/local/bin/mados-power

[module/tray]
type = internal/tray

[settings]
screenchange-reload = true
pseudo-transparency = true

# Hyprland Configuration - Clean & Professional
# ===============================================
# Used on modern hardware with GPU acceleration
# Sway is used on legacy/software-rendering hardware

# ==========================================
# Monitor Configuration
# ==========================================
monitor=,preferred,auto,1

# ==========================================
# Autostart
# ==========================================
exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_CURRENT_DESKTOP
exec-once = systemctl --user enable --now pipewire.socket pipewire-pulse.socket wireplumber.service
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = mados-shellbar-start
exec-once = systemctl --user start skwd-wall.service
exec-once = mados-vbox-guest
exec-once = systemctl --user enable --now swayosd-server
# Steam Deck / Gamepad → WM bridge (translates gamepad buttons to hyprctl commands)
exec-once = mados-gamepad-wm --compositor hyprland
# On-screen keyboard (squeekboard) — auto-activates when no physical keyboard detected
exec-once = mados-squeekboard auto
exec-once = bash -c 'GTK_THEME=$(grep -m1 "^gtk-theme-name=" ~/.config/gtk-3.0/settings.ini 2>/dev/null | cut -d= -f2 || echo adw-gtk3-dark); gsettings set org.gnome.desktop.interface gtk-theme "$GTK_THEME"'
exec-once = bash -c 'ICON_THEME=$(grep -m1 "^gtk-icon-theme-name=" ~/.config/gtk-3.0/settings.ini 2>/dev/null | cut -d= -f2 || echo Papirus); gsettings set org.gnome.desktop.interface icon-theme "$ICON_THEME"'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface text-scaling-factor 0.75
exec-once = bash -c 'CURSOR=$(grep -m1 "^gtk-cursor-theme-name=" ~/.config/gtk-3.0/settings.ini 2>/dev/null | cut -d= -f2 || echo Adwaita); gsettings set org.gnome.desktop.interface cursor-theme "$CURSOR"'
exec-once = bash -c 'CSIZE=$(grep -m1 "^gtk-cursor-theme-size=" ~/.config/gtk-3.0/settings.ini 2>/dev/null | cut -d= -f2 || echo 16); gsettings set org.gnome.desktop.interface cursor-size "$CSIZE"'
exec-once = bash -c 'FONT=$(grep -m1 "^gtk-font-name=" ~/.config/gtk-3.0/settings.ini 2>/dev/null | cut -d= -f2 || echo "JetBrainsMono Nerd Font 10"); gsettings set org.gnome.desktop.interface font-name "$FONT"'
exec-once = mkdir -p ~/Pictures/Screenshots
# Auto-launch installer in live environment (checks archiso/Ventoy conditions)
exec-once = sudo /usr/local/bin/mados-installer-autostart &

# ==========================================
# Environment Variables
# ==========================================
env = XCURSOR_SIZE,16
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORMTHEME,qt5ct

# ==========================================
# Input Configuration
# ==========================================
input {
    kb_layout = es
    kb_options = caps:escape
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
    }
    sensitivity = 0
}

# ==========================================
# General Settings - Cyberpunk Neon Borders
# ==========================================
general {
    gaps_in = 5
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(00ffffee) rgba(ff00ffee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    allow_tearing = false
}

# ==========================================
# Decoration - Cyberpunk Neon Glow
# ==========================================
decoration {
    rounding = 12
    rounding_power = 2
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(ff00ffee)
    }
}

# ==========================================
# Animations - Cyberpunk Industrial
# ==========================================
animations {
    enabled = true
    bezier = cyber, 0.05, 0.9, 0.1, 1.1
    bezier = flick, 0.05, 0.9, 0.1, 1.05
    bezier = fastIn, 0.1, 1, 0, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.3
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = bounce, 0.34, 1.56, 0.64, 1
    animation = windows, 1, 6, overshot, popin 85%
    animation = windowsIn, 1, 6, overshot, slide
    animation = windowsOut, 1, 5, smoothOut, slide
    animation = windowsMove, 1, 5, bounce
    animation = fade, 1, 5, smoothIn
    animation = fadeIn, 1, 5, smoothIn
    animation = fadeOut, 1, 5, smoothOut
    animation = border, 1, 5, bounce
    animation = borderangle, 1, 8, cyber, once
    animation = layers, 1, 4, smoothIn, slide
    animation = workspaces, 1, 6, overshot, slidevert
    animation = specialWorkspace, 1, 6, overshot, fade
}

# ==========================================
# Layouts
# ==========================================
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# ==========================================
# Misc
# ==========================================
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_watchdog_warning = true
}

debug {
    disable_logs = true
}

# ==========================================
# Ecosystem - Suppress startup notifications
# ==========================================
ecosystem {
    no_update_news = true
    no_donation_nag = true
}

# ==========================================
# Key Bindings
# ==========================================
$mainMod = SUPER

# ==========================================
# Wallpaper - skwd-wall (Quickshell-based wallpaper selector)
bind = $mainMod, W, exec, mados-wallpaper-picker toggle
bind = $mainMod CTRL, W, exec, mados-wallpaper-picker web

# ==========================================

# Applications
bind = $mainMod, Return, exec, foot
bind = $mainMod, Q, exec, bash -c 'if hyprctl activewindow | grep -q "title: qs-master"; then ~/.config/hypr/scripts/qs_manager.sh close; else hyprctl dispatch killactive; fi'
bind = $mainMod, R, exec, bash -c '~/.config/hypr/scripts/qs_manager.sh toggle music'
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod SHIFT, E, exit,
bind = $mainMod, ESC, exec, ~/.local/share/quickshell-lockscreen/lock.sh
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod, E, exec, pcmanfm
bind = $mainMod, F, fullscreen,

# Floating
bind = $mainMod SHIFT, SPACE, togglefloating,
bind = $mainMod, SPACE, cyclenext,
bind = $mainMod, A, focusurgentorlast,

# Scratchpad
bind = $mainMod SHIFT, MINUS, movetoworkspacesilent, special:scratchpad
bind = $mainMod, MINUS, togglespecialworkspace, scratchpad

# Move focus - Vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Move focus - Arrow keys
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Down, movefocus, d
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Right, movefocus, r

# Move windows - Vim keys
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# Move windows - Arrow keys
bind = $mainMod SHIFT, Left, movewindow, l
bind = $mainMod SHIFT, Down, movewindow, d
bind = $mainMod SHIFT, Up, movewindow, u
bind = $mainMod SHIFT, Right, movewindow, r

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

# Switch workspaces with Super+Alt+arrows (cycles 1-5 with wrap-around)
bind = $mainMod ALT, Left, exec, mados-hyprland-workspace-cycle prev
bind = $mainMod ALT, Right, exec, mados-hyprland-workspace-cycle next

# Move to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Layout
bind = $mainMod, B, layoutmsg, preselect r
bind = $mainMod, V, layoutmsg, preselect d
bind = $mainMod, S, pseudo,
bind = $mainMod SHIFT, W, togglesplit,

# Resize with submap
bind = $mainMod SHIFT, R, submap, resize
submap = resize
binde = , H, resizeactive, -10 0
binde = , J, resizeactive, 0 10
binde = , K, resizeactive, 0 -10
binde = , L, resizeactive, 10 0
binde = , Left, resizeactive, -10 0
binde = , Down, resizeactive, 0 10
binde = , Up, resizeactive, 0 -10
binde = , Right, resizeactive, 10 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ==========================================
# Multimedia Keys
# ==========================================
bindl = , Caps_Lock, exec, swayosd-client --caps-lock
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindl = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindl = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindl = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise

# On-screen keyboard toggle
bind = $mainMod, F12, exec, mados-squeekboard toggle

# ==========================================
# Screenshots - Using grim/slurp (native Wayland)
# ==========================================
bind = , Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/Screenshot-$(date +%Y-%m-%d-%H-%M-%S).png
bind = SHIFT, Print, exec, grim ~/Pictures/Screenshots/Screenshot-$(date +%Y-%m-%d-%H-%M-%S).png
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# ==========================================
# Window Rules - imperative-dots
# ==========================================
windowrule = float 1, match:title ^(qs-master)$
windowrule = pin 1, match:title ^(qs-master)$
windowrule = no_initial_focus 1, match:title ^(qs-master)$
windowrule = move -5000 -5000, match:title ^(qs-master)$
windowrule = size 1 1, match:title ^(qs-master)$

# ==========================================
# Window Rules - madOS Applications
# ==========================================

# SwayOSD — no animations for OSD popup

layerrule = no_anim on, match:namespace swayosd

windowrule = float 1, match:class ^(mados-photo-viewer)$
windowrule = size 900 700, match:class ^(mados-photo-viewer)$

windowrule = float 1, match:class ^(mados-pdf-viewer)$
windowrule = size 900 700, match:class ^(mados-pdf-viewer)$

windowrule = float 1, match:class ^(mados-equalizer)$
windowrule = size 750 450, match:class ^(mados-equalizer)$

# Squeekboard on-screen keyboard — keep at bottom, no focus steal
windowrule = float 1, match:class ^(sm.puri.Squeekboard)$
windowrule = no_initial_focus 1, match:class ^(sm.puri.Squeekboard)$

# madOS Installer — floating centered window
windowrule = float 1, match:title ^(madOS Installer)
windowrule = size 900 650, match:title ^(madOS Installer)
windowrule = center 1, match:title ^(madOS Installer)

# ==========================================
# XWayland
# ==========================================
xwayland {
    force_zero_scaling = true
}

# ==========================================
# VM Performance Optimizations
# ==========================================
# Sourced only when running inside a VM (generated by session scripts)
# Disables animations and uses solid background for smoother mouse/input
source = ~/.config/hypr/vm-performance.conf
source = ~/.config/hypr/matugen-colors.conf

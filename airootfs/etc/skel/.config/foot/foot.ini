# Foot Configuration - Nord Theme

include=/tmp/foot-matugen-colors.ini

# Fallback Nord colors (used when matugen has not generated the palette yet)
# [colors-dark]
# alpha=0.95
# foreground=D8DEE9
# background=2E3440
# regular0=3B4252
# regular1=BF616A
# regular2=A3BE8C
# regular3=EBCB8B
# regular4=81A1C1
# regular5=B48EAD
# regular6=88C0D0
# regular7=E5E9F0
# bright0=4C566A
# bright1=BF616A
# bright2=A3BE8C
# bright3=EBCB8B
# bright4=81A1C1
# bright5=B48EAD
# bright6=8FBCBB
# bright7=ECEFF4
# selection-foreground=D8DEE9
# selection-background=4C566A

[main]
font=Hack Nerd Font:size=8.5
dpi-aware=yes
pad=14x12

[bell]
urgent=no
notify=no

[scrollback]
lines=10000
multiplier=3.0

[cursor]
style=block
blink=yes
blink-rate=750

[mouse]
hide-when-typing=yes

[url]
launch=xdg-open ${url}

[csd]
preferred=none

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+f
font-increase=Control+plus Control+equal
font-decrease=Control+minus
font-reset=Control+0

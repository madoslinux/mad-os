# /etc/rkhunter.conf - RKHunter configuration for madOS

# Enable all tests
ENABLE_TESTS="all"

# Update mirror
UPDATE_MIRRORS=1
MIRRORS_MODE=0

# Log file
LOGFILE=/var/log/rkhunter/rkhunter.log

# App to check
DISABLE_TESTS="apps"

# Check for rootkits
ROOTKIT_CHECK=1

# Check for suspicious files
SUSPICIOUS_CHECK=1

# Check for hidden files
ALLOWHIDDENFILE=/dev/.systemd/private
ALLOWHIDDENFILE=/dev/.udev
ALLOWHIDDENFILE=/dev/.cache

# Allow specific paths
ALLOWDEVFILE=/dev/zero
ALLOWDEVFILE=/dev/null
ALLOWDEVFILE=/dev/urandom
ALLOWDEVFILE=/dev/mqueue

# Email reports (configure your email)
MAIL-ON-WARNING="root@localhost"
MAILCMD=/usr/bin/mail

# Scanner
SCAN_MODE_THOROUGH=0

# White list commands
WHITELISTED_EVTCHG=/usr/bin/grep
WHITELISTED_EVTCHG=/usr/bin/egrep
WHITELISTED_EVTCHG=/usr/bin/awk
WHITELISTED_EVTCHG=/usr/bin/sed
WHITELISTED_EVTCHG=/usr/bin/dd
WHITELISTED_EVTCHG=/usr/bin/cat
WHITELISTED_EVTCHG=/usr/bin/head
WHITELISTED_EVTCHG=/usr/bin/ls
WHITELISTED_EVTCHG=/usr/bin/md5sum
WHITELISTED_EVTCHG=/usr/bin/sha1sum
WHITELISTED_EVTCHG=/usr/bin/sha256sum
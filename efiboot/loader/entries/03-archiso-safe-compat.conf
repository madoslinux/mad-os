title    madOS Live (Safe Compat) (%ARCH%, UEFI)
sort-key 03
linux    /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-lts
initrd   /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-lts.img
options  archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archisolabel=%ARCHISO_LABEL% cow_spacesize=256M nomodeset i915.enable_psr=0 i915.enable_dc=0 i915.enable_execlists=0 pcie_aspm=off nvme_core.default_ps_max_latency_us=0 ahci.mobile_lpm_policy=1 quiet splash

repos:
  - repo: https://github.com/koalaman/shellcheck-pre-commit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: ["--severity=error"]

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check
        language: system
        types: [python]
        pass_filenames: false
        args: ["."]

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: false
        args: ["."]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python3 -m pytest
        language: system
        types: [python]
        pass_filenames: false
        args: ["tests/test_boot_scripts.py", "tests/test_mados_ota.py", "tests/test_liveusb_scripts.py", "-v"]
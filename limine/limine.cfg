timeout: 10
default_entry: 1
quiet: no

interface_branding: madOS // SYNTHWAVE BOOT
interface_branding_colour: 5
interface_help_colour: 6

term_background: 20110f24
term_foreground: ffb3f5ff
term_background_bright: 30221a3a
term_foreground_bright: ff7df9ff
term_margin: 20
term_margin_gradient: 8
term_palette: 0a0b1a;ff4d6d;00f5d4;ffd166;7b2cbf;ff2a6d;2de2e6;c7d3ff
term_palette_bright: 1a1d3a;ff6b8a;4cffdf;ffe08a;9d4edd;ff5c8a;7efcff;ffffff

/madOS Live
    protocol: linux
    path: boot():/arch/boot/x86_64/vmlinuz-linux-mados-zen
    module_path: boot():/arch/boot/x86_64/initramfs-linux-mados-zen.img
    cmdline: archisobasedir=arch archisosearchuuid=ARCHISO_UUID cow_spacesize=256M quiet splash

/madOS Live with Persistence
    protocol: linux
    path: boot():/arch/boot/x86_64/vmlinuz-linux-mados-zen
    module_path: boot():/arch/boot/x86_64/initramfs-linux-mados-zen.img
    cmdline: archisobasedir=arch archisosearchuuid=ARCHISO_UUID cow_label=mados-persist quiet splash

/madOS Live (Safe Graphics)
    protocol: linux
    path: boot():/arch/boot/x86_64/vmlinuz-linux-mados-zen
    module_path: boot():/arch/boot/x86_64/initramfs-linux-mados-zen.img
    cmdline: archisobasedir=arch archisosearchuuid=ARCHISO_UUID cow_spacesize=256M nomodeset quiet splash

/madOS Installer
    protocol: linux
    path: boot():/arch/boot/x86_64/vmlinuz-linux-mados-zen
    module_path: boot():/arch/boot/x86_64/initramfs-linux-mados-zen.img
    cmdline: archisobasedir=arch archisosearchuuid=ARCHISO_UUID madosinstaller

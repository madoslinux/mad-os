name: "🧪 Tests"

on:
  push:
    branches: [main, develop]
    paths:
      - 'airootfs/**'
      - 'packages.x86_64'
      - 'profiledef.sh'
      - 'pacman.conf'
      - 'grub/**'
      - 'syslinux/**'
      - 'efiboot/**'
      - 'tests/**'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'airootfs/**'
      - 'packages.x86_64'
      - 'profiledef.sh'
      - 'pacman.conf'
      - 'grub/**'
      - 'syslinux/**'
      - 'efiboot/**'
      - 'tests/**'
      - '.github/workflows/tests.yml'

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  DNS_PRIMARY: "8.8.8.8"
  DNS_SECONDARY: "8.8.4.4"
  ARCHLINUX_IMAGE: archlinux:latest

jobs:
  # ================================================================
  # Code Quality & Static Analysis
  # ================================================================
  code-quality:
    name: "🔍 Code Quality"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pytest shellcheck-py

      - name: Run ShellCheck on scripts
        run: |
          find airootfs/usr/local/bin -type f -executable | while read -r script; do
            if head -1 "$script" | grep -qE "(bash|sh)$"; then
              shellcheck "$script" || true
            fi
          done
        continue-on-error: true

      - name: Validate Python syntax
        run: |
          find airootfs -name "*.py" -type f | while read -r script; do
            python3 -m py_compile "$script"
          done

  # ================================================================
  # Unit Tests (parallel by category)
  # ================================================================
  test-unit:
    name: "🧪 Unit: ${{ matrix.category }}"
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - category: "Core"
            files: "tests/test_boot_scripts.py tests/test_post_installation.py tests/test_first_boot.py"
          - category: "AI & Desktop"
            files: "tests/test_opencode.py tests/test_ollama.py tests/test_hyprland_config.py"
          - category: "Hardware"
            files: "tests/test_gpu_detection.py tests/test_wifi_backend.py"
          - category: "Apps"
            files: "tests/test_equalizer_presets.py tests/test_photo_navigator.py tests/test_installer_config.py"
          - category: "Live USB"
            files: "tests/test_liveusb_scripts.py"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: |
          for file in ${{ matrix.files }}; do
            if [ -f "$file" ]; then
              python3 -m pytest "$file" -v
            fi
          done

  # ================================================================
  # Integration Tests
  # ================================================================
  test-integration:
    name: "🔗 Integration"
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "First-Boot Simulation"
            script: "tests/test-first-boot-simulation.sh"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration test
        run: |
          docker run --privileged --rm \
            --dns ${{ env.DNS_PRIMARY }} --dns ${{ env.DNS_SECONDARY }} \
            -v ${{ github.workspace }}:/build \
            ${{ env.ARCHLINUX_IMAGE }} bash /build/${{ matrix.script }}

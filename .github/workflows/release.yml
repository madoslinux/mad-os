name: "🚀 Release"

on:
  workflow_run:
    workflows: ["🏗️ Build"]
    types: [completed]
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ================================================================
  # Upload to Internet Archive
  # ================================================================
  upload-archive:
    name: "📦 Upload to Archive"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    outputs:
      download_url: ${{ steps.upload_ia.outputs.download_url }}
      identifier: ${{ steps.upload_ia.outputs.identifier }}

    steps:
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: mados-iso
          path: out

      - name: Install IA CLI
        run: pip install internetarchive

      - name: Upload to Archive
        id: upload_ia
        env:
          IAS3_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IAS3_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          ISO_NAME=$(ls out/*.iso | head -1 | xargs basename)
          VERSION="${{ github.event.workflow_run.outputs.version }}"
          BUILD_DATE="${{ github.event.workflow_run.outputs.build_date }}"
          RELEASE_TYPE="${{ github.event.workflow_run.outputs.release_type }}"

          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini <<EOF
          [s3]
          access = ${IAS3_ACCESS_KEY}
          secret = ${IAS3_SECRET_KEY}
          EOF
          chmod 600 ~/.config/internetarchive/ia.ini

          if [[ "$RELEASE_TYPE" == "stable" ]]; then
            IDENTIFIER="mados-${VERSION}"
            TITLE="madOS ${VERSION}"
          else
            SHORT_SHA="${{ github.event.workflow_run.outputs.short_sha }}"
            IDENTIFIER="mados-${RELEASE_TYPE}-${VERSION}-${SHORT_SHA}"
            TITLE="madOS ${RELEASE_TYPE^} ${VERSION}"
          fi

          ia upload "$IDENTIFIER" out/*.iso out/SHA256SUMS \
            --retries 3 \
            --metadata="title:${TITLE}" \
            --metadata="mediatype:software" \
            --metadata="collection:opensource" \
            --metadata="description:madOS - AI-Orchestrated Arch Linux Live ISO" \
            --metadata="subject:linux;arch;live-iso;open-source" \
            --metadata="creator:madOS Project" \
            --metadata="date:${BUILD_DATE}"

          echo "download_url=https://archive.org/download/${IDENTIFIER}/${ISO_NAME}" >> "$GITHUB_OUTPUT"
          echo "identifier=$IDENTIFIER" >> "$GITHUB_OUTPUT"

  # ================================================================
  # GitHub Release (only stable)
  # ================================================================
  release:
    name: "🚀 GitHub Release"
    needs: upload-archive
    if: needs.upload-archive.result == 'success' && github.event.workflow_run.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: mados-iso
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.outputs.auto_tag }}
          name: "madOS ${{ github.event.workflow_run.outputs.version }}"
          prerelease: ${{ github.event.workflow_run.outputs.is_prerelease != 'false' }}
          body: |
            **Versión:** `${{ github.event.workflow_run.outputs.version }}`
            **Commit:** `${{ github.sha }}`
            **ISO:** `${{ github.event.workflow_run.outputs.iso_name }}`
            **Tamaño:** ${{ github.event.workflow_run.outputs.iso_size_mb }} MB

            ### 📥 Descarga

            **[Descargar desde Internet Archive](${{ needs.upload-archive.outputs.download_url }})**

            ### ✅ Verificación

            ```bash
            sha256sum -c SHA256SUMS
            ```
          files: out/SHA256SUMS
          make_latest: true

  # ================================================================
  # Update Website
  # ================================================================
  update-website:
    name: "🌐 Update Website"
    needs: upload-archive
    if: needs.upload-archive.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update download link
        run: |
          VERSION="${{ github.event.workflow_run.outputs.version }}"
          DOWNLOAD_URL="${{ needs.upload-archive.outputs.download_url }}"
          RELEASE_TYPE="${{ github.event.workflow_run.outputs.release_type }}"

          [[ "$RELEASE_TYPE" == "stable" ]] && CHANNEL="stable" || CHANNEL="beta"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

          sed -i "/data-channel=\"$CHANNEL\"/s|https://archive.org/download/mados-[^/]*/madOS-[^\"]*\.iso|$DOWNLOAD_URL|g" docs/index.html
          sed -i "/data-channel=\"$CHANNEL\"/s|data-version=\"[^\"]*\"|data-version=\"$VERSION\"|g" docs/index.html

          if ! git diff --quiet docs/index.html; then
            git add docs/index.html
            git commit -m "🌐 Update $CHANNEL download link to $VERSION [skip ci]"
            for i in 1 2 3; do
              git push origin main && break || { git pull --rebase origin main; sleep 2; }
            done
          fi

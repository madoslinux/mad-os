name: Auto Update

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'

jobs:
  notify:
    name: Notify mad-os
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master'))

    steps:
      - name: Dispatch update in mad-os
        run: |
          curl -X POST https://api.github.com/repos/madoslinux/mad-os/dispatches \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type": "app-updated", "client_payload": {"repo": "${{ github.repository }}", "ref": "${{ github.ref }}"}}'
name: "✅ Validation"

on:
  workflow_run:
    workflows: ["🧪 Tests"]
    types: [completed]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests dependency'
        required: false
        default: false
        type: boolean

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: false

env:
  DNS_PRIMARY: "8.8.8.8"
  DNS_SECONDARY: "8.8.4.4"
  ARCHLINUX_IMAGE: archlinux:latest

jobs:
  # ================================================================
  # Installer Validation (runs in Arch container)
  # ================================================================
  validate-installer:
    name: "✅ Validate: ${{ matrix.component }}"
    runs-on: ubuntu-latest
    if: ${{ !github.event.inputs.skip_tests && (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') }}
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: "Python Modules"
            script: "tests/test-installer-python-validation.sh"
          - name: "Config Generation"
            script: "tests/test-installer-config-generation.sh"
          - name: "Disk Installation"
            script: "tests/test-installer-disk-install.sh"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validation
        run: |
          docker run --privileged --rm \
            --dns ${{ env.DNS_PRIMARY }} --dns ${{ env.DNS_SECONDARY }} \
            -v ${{ github.workspace }}:/build \
            ${{ env.ARCHLINUX_IMAGE }} bash /build/${{ matrix.component.script }}

name: CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  DNS_PRIMARY: "8.8.8.8"
  DNS_SECONDARY: "8.8.4.4"
  ARCHLINUX_IMAGE: archlinux:latest

jobs:
  # ================================================================
  # Stage 1: Tests (run in parallel)
  # ================================================================
  code-quality:
    name: "Code Quality"
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pytest shellcheck-py

      - name: Run ShellCheck
        run: |
          find airootfs/usr/local/bin airootfs/usr/local/lib/mados_installer/scripts -type f \( -name "*.sh" -o -executable \) | while read -r script; do
            shellcheck -s bash -e SC2034,SC2317,SC1090,SC2155 "$script"
          done

      - name: Validate Python syntax
        run: |
          find airootfs -name "*.py" -type f | while read -r script; do
            python3 -m py_compile "$script"
          done

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check airootfs tests || true

      - name: Run ruff format check
        run: ruff format --check airootfs tests || true

  test-unit:
    name: "Unit: ${{ matrix.category }}"
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.event_name != 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - category: "Core"
            files: "tests/test_boot_scripts.py tests/test_post_installation.py tests/test_first_boot.py"
          - category: "AI & Desktop"
            files: "tests/test_opencode.py tests/test_ollama.py tests/test_hyprland_config.py"
          - category: "Hardware"
            files: "tests/test_gpu_detection.py tests/test_wifi_backend.py"
          - category: "Apps"
            files: "tests/test_equalizer_presets.py tests/test_photo_navigator.py tests/test_installer_config.py"
          - category: "Live USB"
            files: "tests/test_liveusb_scripts.py"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: |
          for file in ${{ matrix.files }}; do
            if [ -f "$file" ]; then
              python3 -m pytest "$file" -v
            fi
          done

  test-integration:
    name: "Integration"
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.event_name != 'workflow_dispatch'

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "First-Boot Simulation"
            script: "tests/test-first-boot-simulation.sh"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration test
        run: |
          docker run --privileged --rm \
            --dns ${{ env.DNS_PRIMARY }} --dns ${{ env.DNS_SECONDARY }} \
            -v ${{ github.workspace }}:/build \
            ${{ env.ARCHLINUX_IMAGE }} bash /build/${{ matrix.script }}

  # ================================================================
  # Stage 2: Validation (only on push to main/develop after tests pass)
  # ================================================================
  validate:
    name: "Validate: ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: "Python Modules"
            script: "tests/test-installer-python-validation.sh"
          - name: "Config Generation"
            script: "tests/test-installer-config-generation.sh"
          - name: "Disk Installation"
            script: "tests/test-installer-disk-install.sh"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validation
        run: |
          docker run --privileged --rm \
            --dns ${{ env.DNS_PRIMARY }} --dns ${{ env.DNS_SECONDARY }} \
            -v ${{ github.workspace }}:/build \
            ${{ env.ARCHLINUX_IMAGE }} bash /build/${{ matrix.component.script }}

  # ================================================================
  # Stage 3: Auto Tag & Build ISO
  # ================================================================
  auto-tag:
    name: "Auto Tag"
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.create_tag.outputs.new_tag }}
      version: ${{ steps.create_tag.outputs.version }}
      is_release: ${{ steps.create_tag.outputs.is_release }}
      is_prerelease: ${{ steps.create_tag.outputs.is_prerelease }}
      release_type: ${{ steps.create_tag.outputs.release_type }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create version tag
        id: create_tag
        run: |
          set -x
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"
          echo "All tags:"
          git tag -l | sort -V

          if [[ "$BRANCH" == "develop" ]]; then
            # Get last tag excluding betas, sort by version
            LAST_TAG=$(git tag -l 'v*' | grep -v '\-beta' | sort -Vr | head -1)
            echo "Last stable tag (for develop base): $LAST_TAG"
            LAST_TAG="${LAST_TAG:-v0.0.0}"
            BASE_VERSION=$(echo "$LAST_TAG" | sed 's/^v//; s/-.*$//')
            MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
            MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
            PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)

            if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
              COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || echo "")
            else
              COMMITS=$(git log --pretty=format:"%s")
            fi

            HAS_BREAKING=false; HAS_FEATURE=false; HAS_FIX=false
            if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-zA-Z0-9]+!:"; then HAS_BREAKING=true; fi
            if echo "$COMMITS" | grep -qiE "^feat(\(|:)"; then HAS_FEATURE=true; fi
            if echo "$COMMITS" | grep -qiE "^fix(\(|:)|^hotfix(\(|:)"; then HAS_FIX=true; fi

            if [ "$HAS_BREAKING" = "true" ]; then MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif [ "$HAS_FEATURE" = "true" ]; then MINOR=$((MINOR + 1)); PATCH=0
            elif [ "$HAS_FIX" = "true" ]; then PATCH=$((PATCH + 1))
            else MINOR=$((MINOR + 1)); PATCH=0; fi

            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}-beta"
            VERSION="${MAJOR}.${MINOR}.${PATCH}-beta"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "release_type=beta" >> "$GITHUB_OUTPUT"

          elif [[ "$BRANCH" == "main" ]]; then
            # Get last beta tag, sort by version
            LAST_BETA_TAG=$(git tag -l 'v*-beta' | sort -Vr | head -1)
            echo "Last beta tag: $LAST_BETA_TAG"
            if [ -n "$LAST_BETA_TAG" ]; then
              VERSION=$(echo "$LAST_BETA_TAG" | sed 's/^v//; s/-beta$//')
              NEW_TAG="v${VERSION}"
              echo "Derived stable version from beta: $VERSION"
            else
                # Get last stable tag, sort by version
              LAST_STABLE_TAG=$(git tag -l 'v*' | grep -v '\-' | sort -Vr | head -1)
              LAST_STABLE_TAG="${LAST_STABLE_TAG:-v0.0.0}"
              BASE_VERSION=$(echo "$LAST_STABLE_TAG" | sed 's/^v//')
              MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
              MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
              PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)

              if git rev-parse "$LAST_STABLE_TAG" >/dev/null 2>&1; then
                COMMITS=$(git log "${LAST_STABLE_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || echo "")
              else
                COMMITS=$(git log --pretty=format:"%s")
              fi

              HAS_BREAKING=false; HAS_FEATURE=false; HAS_FIX=false
              if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-zA-Z0-9]+!:"; then HAS_BREAKING=true; fi
              if echo "$COMMITS" | grep -qiE "^feat(\(|:)"; then HAS_FEATURE=true; fi
              if echo "$COMMITS" | grep -qiE "^fix(\(|:)|^hotfix(\(|:)"; then HAS_FIX=true; fi

              if [ "$HAS_BREAKING" = "true" ]; then MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
              elif [ "$HAS_FEATURE" = "true" ]; then MINOR=$((MINOR + 1)); PATCH=0
              elif [ "$HAS_FIX" = "true" ]; then PATCH=$((PATCH + 1))
              else MINOR=$((MINOR + 1)); PATCH=0; fi

              NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_type=stable" >> "$GITHUB_OUTPUT"
          fi

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $NEW_TAG already exists"
            echo "new_tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          else
            echo "Creating tag $NEW_TAG"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$NEW_TAG" -m "Auto-generated tag $NEW_TAG"
            git push origin "$NEW_TAG"
            echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: "Build ISO"
    runs-on: ubuntu-latest
    needs: auto-tag
    if: startsWith(github.ref, 'refs/tags/') && always() && !cancelled() && (needs.auto-tag.result == 'success' || needs.auto-tag.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build ISO
        id: build
        run: |
          WORKSPACE="${{ github.workspace }}"
          
          rm -rf out/ 2>/dev/null || true
          mkdir -p out
          chmod 777 out
          
          docker run --privileged --rm \
            --dns ${{ env.DNS_PRIMARY }} --dns ${{ env.DNS_SECONDARY }} \
            -v "$WORKSPACE:/build" \
            ${{ env.ARCHLINUX_IMAGE }} bash -c "
              set -e
              echo 'nameserver ${{ env.DNS_PRIMARY }}' > /etc/resolv.conf
              echo 'nameserver ${{ env.DNS_SECONDARY }}' >> /etc/resolv.conf
              pacman-key --init && pacman-key --populate
              pacman -Syu --noconfirm archiso
              cd /build
              rm -rf out/*
              
              mkarchiso -v -w /tmp/work -o out .
            "
          
          ISO_FILE=$(ls out/*.iso 2>/dev/null | head -1)
          if [ -z "$ISO_FILE" ]; then
            echo "ERROR: No ISO file found"
            exit 1
          fi
          
          sha256sum out/*.iso > out/SHA256SUMS || true
          
          # Rename ISO to use version for predictable naming
          VERSION="${{ needs.auto-tag.outputs.version }}"
          [ -n "$VERSION" ] || VERSION="${GITHUB_REF_NAME#v}"
          [ -n "$VERSION" ] || VERSION="dev-$(date +%Y%m%d)"
          
          ISO_FILE=$(ls out/*.iso | head -1)
          NEW_ISO_NAME="madOS-${VERSION}-x86_64.iso"
          mv "$ISO_FILE" "out/${NEW_ISO_NAME}"
          
          # Update SHA256SUMS with new name
          sed -i "s/$(basename "$ISO_FILE")/${NEW_ISO_NAME}/g" out/SHA256SUMS
          
          ISO_NAME="$NEW_ISO_NAME"
          BUILD_DATE=$(date +%Y.%m.%d)
          ISO_SIZE=$(stat --format=%s "out/${ISO_NAME}" 2>/dev/null || echo 0)
          ISO_SIZE_MB=$((ISO_SIZE / 1024 / 1024))
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          
          echo "iso_name=$ISO_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "iso_size_mb=$ISO_SIZE_MB" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          echo "Build successful!"

      - name: Install IA CLI & dependencies
        run: pip install internetarchive requests

      - name: Upload to Internet Archive
        id: upload_ia
        env:
          IAS3_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IAS3_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          ISO_FILE=$(ls out/*.iso | head -1)
          
          if [ -z "$ISO_FILE" ]; then
            echo "ERROR: No ISO file found in out/"
            ls -la out/
            exit 1
          fi
          
          # Verify ISO is a file, not a directory
          if [ ! -f "$ISO_FILE" ]; then
            echo "ERROR: $ISO_FILE is not a file, it's a directory!"
            ls -la "$ISO_FILE"
            exit 1
          fi
          
          ISO_SIZE=$(stat --format=%s "$ISO_FILE" 2>/dev/null || echo 0)
          if [ "$ISO_SIZE" -lt 1000000 ]; then
            echo "ERROR: ISO file too small ($ISO_SIZE bytes), something is wrong"
            ls -la "$ISO_FILE"
            exit 1
          fi
          
          echo "ISO file: $ISO_FILE ($(($ISO_SIZE / 1024 / 1024)) MB)"
          
          ISO_NAME=$(basename "$ISO_FILE")
          VERSION="${{ needs.auto-tag.outputs.version }}"
          BUILD_DATE="${{ steps.build.outputs.build_date }}"
          RELEASE_TYPE="${{ needs.auto-tag.outputs.release_type }}"

          # Set identifier based on release type
          if [[ "$RELEASE_TYPE" == "stable" ]]; then
            IDENTIFIER="mados-stable"
          else
            IDENTIFIER="mados-beta"
          fi

          echo "Uploading ${ISO_NAME} to ${IDENTIFIER}"

          # Upload ISO using S3 API
          echo "Uploading ISO: $ISO_FILE (size: $(stat --format=%s "$ISO_FILE") bytes)"
          ls -la "$ISO_FILE"
          
          ISO_RESPONSE=$(curl -s -w "%{http_code}" -X PUT \
            -H "Authorization: LOW ${IAS3_ACCESS_KEY}:${IAS3_SECRET_KEY}" \
            -H "x-amz-acl: public-read" \
            -H "x-archive-auto-make-bucket:1" \
            -H "x-archive-meta-title:madOS ${RELEASE_TYPE^}" \
            -H "x-archive-meta-mediatype:software" \
            -H "x-archive-meta-collection:opensource" \
            -H "x-archive-meta-description:madOS - AI-Orchestrated Arch Linux Live ISO" \
            -H "x-archive-meta-subject:linux;arch;live-iso;open-source" \
            -H "x-archive-meta-creator:madOS Project" \
            -H "x-archive-meta-date:${BUILD_DATE}" \
            --upload-file "$ISO_FILE" \
            "https://s3.us.archive.org/${IDENTIFIER}/${ISO_NAME}")

          if [ "$ISO_RESPONSE" != "200" ] && [ "$ISO_RESPONSE" != "201" ]; then
            echo "ERROR: ISO upload failed with HTTP $ISO_RESPONSE"
            exit 1
          fi

          # Upload SHA256SUMS
          SHA_RESPONSE=$(curl -s -w "%{http_code}" -X PUT \
            -H "Authorization: LOW ${IAS3_ACCESS_KEY}:${IAS3_SECRET_KEY}" \
            -H "x-amz-acl: public-read" \
            --upload-file out/SHA256SUMS \
            "https://s3.us.archive.org/${IDENTIFIER}/SHA256SUMS")

          if [ "$SHA_RESPONSE" != "200" ] && [ "$SHA_RESPONSE" != "201" ]; then
            echo "ERROR: SHA256SUMS upload failed with HTTP $SHA_RESPONSE"
            exit 1
          fi

          DOWNLOAD_URL="https://archive.org/download/${IDENTIFIER}/${ISO_NAME}"
          echo "download_url=${DOWNLOAD_URL}" >> "$GITHUB_OUTPUT"
          echo "identifier=${IDENTIFIER}" >> "$GITHUB_OUTPUT"
          echo "iso_name=${ISO_NAME}" >> "$GITHUB_OUTPUT"

    outputs:
      iso_name: ${{ steps.build.outputs.iso_name }}
      version: ${{ steps.build.outputs.version }}
      build_date: ${{ steps.build.outputs.build_date }}
      iso_size_mb: ${{ steps.build.outputs.iso_size_mb }}
      short_sha: ${{ steps.build.outputs.short_sha }}
      is_release: ${{ needs.auto-tag.outputs.is_release }}
      is_prerelease: ${{ needs.auto-tag.outputs.is_prerelease }}
      release_type: ${{ needs.auto-tag.outputs.release_type }}
      auto_tag: ${{ needs.auto-tag.outputs.new_tag }}
      download_url: ${{ steps.upload_ia.outputs.download_url }}
      identifier: ${{ steps.upload_ia.outputs.identifier }}

  # ================================================================  
  # Stage 4: Update Download Info & Website (direct to gh-pages)
  # ================================================================
  update-download-info:
    name: "Update Download Info"
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success' && (github.ref == 'refs/heads/develop' || needs.build.outputs.is_release == 'true')
    permissions:
      contents: write

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Update download links
        env:
          DOWNLOAD_URL: ${{ needs.build.outputs.download_url }}
          VERSION: ${{ needs.build.outputs.version }}
          RELEASE_TYPE: ${{ needs.build.outputs.release_type }}
          BUILD_DATE: ${{ needs.build.outputs.build_date }}
        run: |
          if [[ "$RELEASE_TYPE" == "stable" ]]; then
            CHANNEL="stable"
          else
            CHANNEL="beta"
          fi
          echo "CHANNEL=$CHANNEL"
          export CHANNEL

          # Update download-info.html (JSON)
          python3 << EOF
          import json
          import os

          FRONT_MATTER = "---\nlayout: null\n---\n"

          with open('download-info.html', 'r') as f:
              content = f.read()
          
          if content.startswith('---'):
              parts = content.split('---', 2)
              json_str = parts[2] if len(parts) > 2 else content
              data = json.loads(json_str)
          else:
              data = json.loads(content)

          download_url = os.environ.get('DOWNLOAD_URL', '')
          version = os.environ.get('VERSION', '')
          build_date = os.environ.get('BUILD_DATE', '')
          channel = os.environ.get('CHANNEL', 'beta')

          if version and download_url:
              data[channel] = {
                  'version': version,
                  'url': download_url,
                  'date': build_date
              }

              json_str = json.dumps(data, indent=2)
              
              if content.startswith('---'):
                  full_content = FRONT_MATTER + json_str
              else:
                  full_content = json_str
              
              with open('download-info.html', 'w') as f:
                  f.write(full_content)
              print("Updated " + channel + ": v" + version)
          EOF

          # Update index.html - specific to each channel
          if [[ "$CHANNEL" == "beta" ]]; then
            sed -i "s|id=\"beta-download-link\" href=\"[^\"]*\"|id=\"beta-download-link\" href=\"$DOWNLOAD_URL\"|g" index.html
            sed -i "s|id=\"beta-download-link\" data-version=\"[^\"]*\"|id=\"beta-download-link\" data-version=\"$VERSION\"|g" index.html
            sed -i "s|<span id=\"beta-version-text\">Download v[^<]*</span>|<span id=\"beta-version-text\">Download v$VERSION</span>|g" index.html
          else
            sed -i "s|id=\"stable-download-link\" href=\"[^\"]*\"|id=\"stable-download-link\" href=\"$DOWNLOAD_URL\"|g" index.html
            sed -i "s|id=\"stable-download-link\" data-version=\"[^\"]*\"|id=\"stable-download-link\" data-version=\"$VERSION\"|g" index.html
            sed -i "s|<span id=\"stable-version-text\">Download v[^<]*</span>|<span id=\"stable-version-text\">Download v$VERSION</span>|g" index.html
          fi

      - name: Commit and Push
        run: |
          if git diff --quiet download-info.html index.html; then
            echo "No changes to commit"
            exit 0
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add download-info.html index.html
          git commit -m "ci: update download links to ${{ needs.build.outputs.version }}"
          git push origin gh-pages

  # ================================================================
  # GitHub Release (only stable)
  # ================================================================
  release:
    name: "GitHub Release"
    needs: build
    if: needs.build.result == 'success' && needs.build.outputs.auto_tag != '' && needs.build.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download SHA256SUMS from Internet Archive
        run: |
          IDENTIFIER="${{ needs.build.outputs.identifier }}"
          mkdir -p out
          curl -L "https://archive.org/download/${IDENTIFIER}/SHA256SUMS" -o out/SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.auto_tag }}
          name: "madOS ${{ needs.build.outputs.version }}"
          prerelease: false
          body: |
            **Version:** `${{ needs.build.outputs.version }}`
            **Commit:** `${{ github.sha }}`
            **ISO:** `${{ needs.build.outputs.iso_name }}`
            **Size:** ${{ needs.build.outputs.iso_size_mb }} MB

            ### Download

            **[Download from Internet Archive](${{ needs.build.outputs.download_url }})**

            ### Verification

            ```bash
            sha256sum -c SHA256SUMS
            ```
          files: out/SHA256SUMS
          make_latest: true

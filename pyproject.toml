[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]
ignore = ["E402", "F401"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011", "F841", "I001", "F811", "N806", "E741", "UP015", "W293", "W291", "B905", "B007", "N802", "UP024"]
"airootfs/usr/local/lib/mados_*/**" = ["E402", "F401", "I001", "B904", "UP024", "W293", "W291", "UP041", "UP015", "B905", "UP032", "B007", "F541", "F841"]
"airootfs/usr/local/bin/*" = ["I001"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["airootfs"]
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]

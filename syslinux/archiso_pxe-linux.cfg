LABEL arch_nbd
TEXT HELP
Boot madOS Live environment using NBD.
Includes the madOS installer for system installation.
ENDTEXT
MENU LABEL madOS Live (%ARCH%, NBD)
LINUX ::/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-lts
INITRD ::/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-lts.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archisolabel=%ARCHISO_LABEL% archiso_nbd_srv=${pxeserver} cow_spacesize=256M cms_verify=y quiet splash loglevel=3 rd.udev.log_level=3 udev.log_priority=3 rd.systemd.show_status=false systemd.show_status=false vt.global_cursor_default=0 plymouth.ignore-serial-consoles
SYSAPPEND 3


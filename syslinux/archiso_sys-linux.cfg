  LABEL arch
  TEXT HELP
  Boot madOS Live environment with Sway compositor.
  Includes the madOS installer for system installation.
  ENDTEXT
  MENU LABEL madOS Lite Live (%ARCH%, BIOS)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-mados
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-mados.img
  APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=256M quiet splash plymouth.ignore-serial-consoles vt.global_cursor_default=0 console=tty2 loglevel=3 floppy=0 intel_idle.max_cstate=1 i915.enable_dc=0 ahci.mobile_lpm_policy=1

  LABEL arch-persist
  TEXT HELP
  Boot madOS Live with persistence. Requires a partition labeled 'mados-persist'.
  ENDTEXT
  MENU LABEL madOS Lite Live with Persistence (%ARCH%, BIOS)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-mados
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-mados.img
  APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_label=mados-persist quiet splash plymouth.ignore-serial-consoles vt.global_cursor_default=0 console=tty2 loglevel=3 floppy=0 intel_idle.max_cstate=1 i915.enable_dc=0 ahci.mobile_lpm_policy=1

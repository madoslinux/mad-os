  LABEL arch
  TEXT HELP
  Boot madOS Live environment with Sway compositor.
  Includes the madOS installer for system installation.
  ENDTEXT
  MENU LABEL madOS Live (%ARCH%, BIOS)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-lts
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-lts.img
  APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archisolabel=%ARCHISO_LABEL% cow_spacesize=256M quiet splash loglevel=3 rd.udev.log_level=3 udev.log_priority=3 rd.systemd.show_status=false systemd.show_status=false vt.global_cursor_default=0 plymouth.ignore-serial-consoles floppy=0 intel_idle.max_cstate=1 i915.enable_dc=0 ahci.mobile_lpm_policy=1

  LABEL arch-persist
  TEXT HELP
  Boot madOS Live with persistence. Requires a partition labeled 'mados-persist'.
  ENDTEXT
  MENU LABEL madOS Live with Persistence (%ARCH%, BIOS)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-lts
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-lts.img
  APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archisolabel=%ARCHISO_LABEL% cow_label=mados-persist quiet splash loglevel=3 rd.udev.log_level=3 udev.log_priority=3 rd.systemd.show_status=false systemd.show_status=false vt.global_cursor_default=0 plymouth.ignore-serial-consoles floppy=0 intel_idle.max_cstate=1 i915.enable_dc=0 ahci.mobile_lpm_policy=1

  # Software rendering boot option (wlroots compatible)
  LABEL archsafe
  TEXT HELP
  Boot madOS Live with forced software rendering (pixman/llvmpipe).
  Keeps KMS/DRM enabled for Wayland compositors.
  ENDTEXT
  MENU LABEL madOS Live (Software Rendering) (%ARCH%, BIOS)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-lts
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-lts.img
  APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archisolabel=%ARCHISO_LABEL% cow_spacesize=256M mados.force_software=1 quiet splash loglevel=3 rd.udev.log_level=3 udev.log_priority=3 rd.systemd.show_status=false systemd.show_status=false vt.global_cursor_default=0 plymouth.ignore-serial-consoles floppy=0 intel_idle.max_cstate=1 i915.enable_dc=0 ahci.mobile_lpm_policy=1

  LABEL arch
  TEXT HELP
  Boot madOS Live environment with Hyprland compositor.
  Includes the madOS installer for system installation.
  ENDTEXT
  MENU LABEL madOS Live (%ARCH%, BIOS)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-mados
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-mados.img
  APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=256M quiet splash floppy=0 intel_idle.max_cstate=1 i915.enable_dc=0 ahci.mobile_lpm_policy=1

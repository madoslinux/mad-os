  LABEL archcompat
  TEXT HELP
  Boot madOS Live in Safe Compatibility mode.
  Uses conservative kernel parameters for difficult hardware.
  ENDTEXT
  MENU LABEL madOS Live (Safe Compat) (%ARCH%, BIOS)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-mados
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-mados.img
  APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=256M nomodeset i915.enable_psr=0 pcie_aspm=off nvme_core.default_ps_max_latency_us=0 plymouth.enable=0 loglevel=7 floppy=0

  LABEL archcompat
  TEXT HELP
  Boot madOS Live in Safe Compatibility mode.
  Uses conservative kernel parameters for difficult hardware.
  ENDTEXT
  MENU LABEL madOS Live (Safe Compat) (%ARCH%, BIOS)
  LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-lts
  INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-lts.img
  APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archisolabel=%ARCHISO_LABEL% cow_spacesize=256M nomodeset i915.enable_psr=0 pcie_aspm=off nvme_core.default_ps_max_latency_us=0 quiet splash loglevel=3 rd.udev.log_level=3 udev.log_priority=3 rd.systemd.show_status=false systemd.show_status=false vt.global_cursor_default=0 plymouth.ignore-serial-consoles floppy=0
